<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Browsing Page</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .search-bar { margin-bottom: 20px; }
        .script-card { border: 1px solid #ccc; padding: 10px; margin: 10px; border-radius: 5px; }
        .script-card h3 { margin: 0; }
        .script-card p { margin: 5px 0; }
        .card-container { display: flex; flex-wrap: wrap; }
    </style>
</head>
<body>
    <h1>Browse Scripts</h1>
    <input type="text" class="search-bar" placeholder="Search scripts..." oninput="filterScripts()">
    <div class="card-container" id="scriptContainer">
        <div class="script-card" data-category="action">
            <h3>Jump Script</h3>
            <p>Enhances jump height for players.</p>
        </div>
        <div class="script-card" data-category="utility">
            <h3>Speed Boost</h3>
            <p>Increases player speed temporarily.</p>
        </div>
        <div class="script-card" data-category="action">
            <h3>Double Jump</h3>
            <p>Allows players to jump twice in the air.</p>
        </div>
        <div class="script-card" data-category="utility">
            <h3>Infinite Health</h3>
            <p>Grants infinite health to players.</p>
        </div>
        <!-- Add more script cards as needed -->
    </div>
    <script>
        function filterScripts() {
            const searchInput = document.querySelector('.search-bar').value.toLowerCase();
            const scriptCards = document.querySelectorAll('.script-card');
            scriptCards.forEach(card => {
                const scriptTitle = card.querySelector('h3').innerText.toLowerCase();
                if (scriptTitle.includes(searchInput)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
